services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: goldandtime-web:latest
    container_name: goldandtime-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:3010:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
